openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Uni Shop API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: listings
    description: Marketplace listing operations
  - name: users
    description: User profile operations
  - name: favorites
    description: Favorite listing operations
  - name: stats
    description: Marketplace statistics

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /listings:
    get:
      operationId: getListings
      tags: [listings]
      summary: Get all listings
      parameters:
        - name: section
          in: query
          required: false
          schema:
            type: string
        - name: category
          in: query
          required: false
          schema:
            type: string
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: minPrice
          in: query
          required: false
          schema:
            type: number
        - name: maxPrice
          in: query
          required: false
          schema:
            type: number
        - name: sort
          in: query
          required: false
          schema:
            type: string
            enum: [newest, price_asc, price_desc, popular]
      responses:
        "200":
          description: List of listings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Listing"
    post:
      operationId: createListing
      tags: [listings]
      summary: Create a new listing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ListingInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Listing"

  /listings/featured:
    get:
      operationId: getFeaturedListings
      tags: [listings]
      summary: Get featured/trending listings
      responses:
        "200":
          description: Featured listings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Listing"

  /listings/recent:
    get:
      operationId: getRecentListings
      tags: [listings]
      summary: Get most recently added listings
      responses:
        "200":
          description: Recent listings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Listing"

  /listings/{id}:
    get:
      operationId: getListing
      tags: [listings]
      summary: Get a single listing
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Listing found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Listing"
        "404":
          description: Not found
    patch:
      operationId: updateListing
      tags: [listings]
      summary: Update a listing
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ListingUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Listing"
    delete:
      operationId: deleteListing
      tags: [listings]
      summary: Delete a listing
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /listings/{id}/contact:
    post:
      operationId: contactSeller
      tags: [listings]
      summary: Send a message to the seller of a listing
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactInput"
      responses:
        "200":
          description: Contact request sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactResult"

  /favorites:
    get:
      operationId: getFavorites
      tags: [favorites]
      summary: Get all favorite listings for a user (by userId query param)
      parameters:
        - name: userId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Favorite listings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Listing"

  /favorites/toggle:
    post:
      operationId: toggleFavorite
      tags: [favorites]
      summary: Toggle a listing as favorite for a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FavoriteInput"
      responses:
        "200":
          description: Toggle result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FavoriteResult"

  /users:
    get:
      operationId: getUsers
      tags: [users]
      summary: Get all users
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: createUser
      tags: [users]
      summary: Create a user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get a user profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: Not found

  /users/{id}/listings:
    get:
      operationId: getUserListings
      tags: [users]
      summary: Get all listings by a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User's listings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Listing"

  /stats:
    get:
      operationId: getStats
      tags: [stats]
      summary: Get overall marketplace statistics
      responses:
        "200":
          description: Marketplace stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketplaceStats"

  /categories/stats:
    get:
      operationId: getCategoryStats
      tags: [stats]
      summary: Get listing counts per category
      responses:
        "200":
          description: Category stats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryStat"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    User:
      type: object
      required: [id, name, university, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        university:
          type: string
        bio:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        createdAt:
          type: string

    UserInput:
      type: object
      required: [name, university]
      properties:
        name:
          type: string
          minLength: 1
        university:
          type: string
          minLength: 1
        bio:
          type: string
        avatarUrl:
          type: string

    Listing:
      type: object
      required: [id, title, description, price, category, sellerId, sellerName, sellerUniversity, status, createdAt, favoriteCount]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        price:
          type: number
        category:
          type: string
        section:
          type: string
        imageUrl:
          type: ["string", "null"]
        sellerId:
          type: integer
        sellerName:
          type: string
        sellerUniversity:
          type: string
        status:
          type: string
          enum: [available, sold, reserved]
        tags:
          type: ["string", "null"]
        favoriteCount:
          type: integer
        createdAt:
          type: string

    ListingInput:
      type: object
      required: [title, description, price, category, sellerId]
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
          minLength: 1
        price:
          type: number
        category:
          type: string
        section:
          type: string
        imageUrl:
          type: string
        sellerId:
          type: integer
        tags:
          type: string
        status:
          type: string
          enum: [available, sold, reserved]

    ListingUpdate:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        price:
          type: number
        category:
          type: string
        imageUrl:
          type: string
        status:
          type: string
          enum: [available, sold, reserved]
        tags:
          type: string

    FavoriteInput:
      type: object
      required: [userId, listingId]
      properties:
        userId:
          type: integer
        listingId:
          type: integer

    FavoriteResult:
      type: object
      required: [favorited]
      properties:
        favorited:
          type: boolean

    ContactInput:
      type: object
      required: [name, email, message]
      properties:
        name:
          type: string
        email:
          type: string
        message:
          type: string

    ContactResult:
      type: object
      required: [success]
      properties:
        success:
          type: boolean

    MarketplaceStats:
      type: object
      required: [totalListings, totalUsers, totalCategories, totalSold]
      properties:
        totalListings:
          type: integer
        totalUsers:
          type: integer
        totalCategories:
          type: integer
        totalSold:
          type: integer

    CategoryStat:
      type: object
      required: [category, count]
      properties:
        category:
          type: string
        count:
          type: integer

    RequestUploadUrlBody:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
        size:
          type: integer
        contentType:
          type: string

    RequestUploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
        objectPath:
          type: string
        metadata:
          type: object
          properties:
            name:
              type: string
            size:
              type: integer
            contentType:
              type: string
